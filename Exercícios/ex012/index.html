<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu proprio servidor</p>
    <video width="700" poster="imagens/limoes-capa.png" controls loop>
      <source src="midia/meu-video.mp4.mp4" type="video/mp4">
      <source src="midia/meu-video.m4v.mp4" type="video/mp4">
      <source src="midia/meu-video.webm.webm" type="video/webm">
      <source src="midia/meu-video.ogg.ogv" type="video/ogv">
      <p>Seu navegador não tem conbatibilidade com reprodução de vídeos.</p>
    </video>
    <h1>Inserindo vídeos do youtube</h1>
    <iframe width="700" height="315" src="https://www.youtube.com/embed/jPWsBuiy1rE?si=-qAIVAmtSk7bwxdP" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
