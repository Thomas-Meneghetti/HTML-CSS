       @font-face {
        font-family: 'love';

            /*
                   Tipos de format()
                   - opentype(otf)
                   - truetype(ttf)

                   - truetype-aat (Apple Advanced Typography)
            */

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{

            font-size: 3em;

        }
